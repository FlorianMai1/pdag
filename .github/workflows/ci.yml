name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    name: lint + unit tests + vuln
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt (check, do not rewrite)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Run golangci-lint as a plain step rather than golangci/golangci-lint-action
      # so CI carries no Node-20 JS action (the action still ships a Node 20
      # runtime). `go run` compiles it with the runner's Go, so its build
      # toolchain is never older than the module's targeted Go version.
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

      - name: unit tests (race)
        run: CGO_ENABLED=1 go test -race -count=1 ./cmd/... ./internal/... ./sdk/...

      - name: build pdag + plugins
        run: make all

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  integration:
    name: integration tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # The e2e suite launches PowerDNS + Postgres via testcontainers and builds
      # its own plugin subprocesses in TestMain; Docker is available on
      # ubuntu-latest runners.
      - name: integration tests
        run: CGO_ENABLED=1 go test -race -count=1 -timeout 300s ./tests/...
