version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - misspell
    - nilerr
    - noctx
    - sqlclosecheck
    - unconvert
    - wastedassign
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    govet:
      enable:
        - shadow
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - errcheck
          - govet
          - noctx
        path: _test\.go
      - linters:
          - noctx
        path: tests/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/FlorianMai1/pdag
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
