run:
  timeout: 3m

linters:
  enable:
    - errorlint
    - gofmt
    - goimports
    - misspell
    - nilerr
    - bodyclose
    - noctx
    - unconvert
    - wastedassign
    - sqlclosecheck

linters-settings:
  errorlint:
    errorf: true
    asserts: true
    comparison: true

  govet:
    enable:
      - shadow

  goimports:
    local-prefixes: github.com/FlorianMai1/pdag

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
        - govet

    - path: tests/
      linters:
        - noctx

  max-issues-per-linter: 0
  max-same-issues: 0
